auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ── Query result cache (replaces deprecated fifocache) ──────────────────────
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 500

# ── Chunk cache (replaces deprecated fifocache) ─────────────────────────────
chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 500
      ttl: 24h

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_parallelism: 32
  max_entries_limit_per_query: 50000
  # KEY FIX: 0 = disable query splitting.
  # Without this, Loki splits a 7-day range query into dozens of sub-queries
  # per panel. With 16+ panels firing simultaneously = hundreds of outstanding
  # requests → "too many outstanding requests" error.
  split_queries_by_interval: 0

frontend:
  max_outstanding_per_tenant: 2048

querier:
  max_concurrent: 20
